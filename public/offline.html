<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нет подключения - Безмятежные</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 500px;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }
    
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      opacity: 0.9;
    }
    
    .tips {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-align: left;
      margin-bottom: 2rem;
    }
    
    .tips h2 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }
    
    .tips ul {
      list-style: none;
      padding: 0;
    }
    
    .tips li {
      padding: 0.5rem 0;
      padding-left: 1.5rem;
      position: relative;
    }
    
    .tips li:before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #60a5fa;
      font-weight: bold;
    }
    
    .button {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 1rem 2rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
    
    @media (max-width: 640px) {
      h1 {
        font-size: 1.5rem;
      }
      
      p {
        font-size: 1rem;
      }
      
      .icon {
        width: 100px;
        height: 100px;
        font-size: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Нет подключения к интернету</h1>
    <p>Кажется, вы находитесь в офлайн режиме. Не волнуйтесь, некоторые функции всё ещё доступны!</p>
    
    <div class="tips">
      <h2>Что можно сделать:</h2>
      <ul>
        <li>Дыхательные упражнения для успокоения</li>
        <li>Просмотр кэшированных страниц</li>
        <li>Техники заземления 5-4-3-2-1</li>
        <li>Просмотр сохранённых записей</li>
      </ul>
    </div>
    
    <button class="button" onclick="location.reload()">
      Попробовать снова
    </button>
  </div>
</body>
</html>
