name: Полная замена X ← выбранный репозиторий

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Репозиторий-источник (owner/repo)'
        required: true
        type: string
      source_branch:
        description: 'Ветка'
        required: false
        default: 'main'

jobs:
  replace:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория X
        uses: actions/checkout@v4

      - name: 🔍 Диагностика токена и репозитория
        run: |
          echo "Проверяем доступ к репозиторию..."
          echo "Source repo: ${{ inputs.source_repo }}"
          echo "Branch: ${{ inputs.source_branch }}"
          curl -I -H "Authorization: token ${{ secrets.GH_PAT }}" \
               https://api.github.com/repos/${{ inputs.source_repo }}

      - name: Клонировать исходный репозиторий
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_branch }}
          path: temp-source
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Проверка результата клонирования
        run: |
          echo "=== Содержимое текущей папки ==="
          ls -la
          echo "=== Содержимое temp-source ==="
          if [ -d "temp-source" ]; then
            ls -la temp-source
            echo "Количество файлов: $(find temp-source -type f | wc -l)"
          else
            echo "❌ temp-source НЕ СОЗДАН!"
            exit 1
          fi

      - name: Полная очистка X
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' -exec rm -rf {} +

      - name: Копирование файлов
        run: |
          rsync -av --ignore-errors --exclude='.git' --exclude='.github' temp-source/ ./

      - name: Commit и push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Нет изменений"
          else
            git commit -m "Полная замена из ${{ inputs.source_repo }} (${{ inputs.source_branch }})"
            git push
          fi

      - name: Очистка
        if: always()
        run: rm -rf temp-source