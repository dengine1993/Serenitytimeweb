name: Полная замена X ← выбранный репозиторий

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Репозиторий-источник (owner/repo)'
        required: true
        type: string
      source_branch:
        description: 'Ветка (обычно main)'
        required: false
        default: 'main'

jobs:
  replace:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория X
        uses: actions/checkout@v4

      - name: Клонировать исходный репозиторий
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_branch }}
          path: temp-source
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Проверка, что клонирование прошло успешно
        run: |
          if [ ! -d "temp-source" ] || [ -z "$(ls -A temp-source 2>/dev/null)" ]; then
            echo "❌ Ошибка: temp-source не создан или пустой"
            exit 1
          fi
          echo "✅ temp-source успешно клонирован ($(ls temp-source | wc -l) объектов)"

      - name: Полная очистка репозитория X
        run: |
          echo "Очищаем всё кроме .git и .github..."
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            -exec rm -rf {} +

      - name: Копирование файлов из source в X
        run: |
          rsync -av --ignore-errors \
                --exclude='.git' \
                --exclude='.github' \
                temp-source/ ./

      - name: Commit и push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "Полная замена из ${{ inputs.source_repo }} (${{ inputs.source_branch }})"
            git push
          fi

      - name: Очистка
        if: always()
        run: rm -rf temp-source