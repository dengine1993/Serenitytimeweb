name: Полная замена — очистка X + копирование

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Репозиторий-источник (owner/repo)'
        required: true
        type: string
      source_branch:
        description: 'Ветка'
        required: false
        default: 'main'

jobs:
  replace:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория X
        uses: actions/checkout@v4

      - name: Клонировать исходный репозиторий
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_branch }}
          path: temp-source
          token: ${{ secrets.GH_PAT }}

      - name: Полная очистка X (кроме .git и .github)
        run: |
          # Удаляем всё, кроме .git и .github
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' -exec rm -rf {} +

      - name: Копирование всех файлов из source в X
        run: |
          rsync -av --ignore-errors \
                --exclude='.git' \
                --exclude='.github' \
                temp-source/ ./

      - name: Commit и push изменений
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Полная замена из ${{ inputs.source_repo }} (${{ inputs.source_branch }})" || echo "Нет изменений"
          git push

      - name: Очистка
        run: rm -rf temp-source