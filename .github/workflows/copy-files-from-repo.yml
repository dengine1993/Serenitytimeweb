name: Полная замена X ← выбранный репозиторий

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Репозиторий-источник (owner/repo)'
        required: true
        type: string
      source_branch:
        description: 'Ветка'
        required: false
        default: 'main'

jobs:
  replace:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout X (только metadata)
        uses: actions/checkout@v4
        with:
          sparse-checkout: '.github'   # сначала берём только .github

      - name: Клонировать source-репозиторий
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_branch }}
          path: temp-source
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Полная замена
        run: |
          echo "🗑️ Удаляем всё кроме .git и .github..."
          shopt -s extglob
          rm -rf !(.git|.github|temp-source) 2>/dev/null || true

          echo "📋 Копируем файлы из source..."
          rsync -av --ignore-errors \
                --exclude='.git' \
                --exclude='.github' \
                temp-source/ ./

      - name: Commit и push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git add -A --all
          if git diff --cached --quiet; then
            echo "Нет изменений"
          else
            git commit -m "Полная замена из ${{ inputs.source_repo }} (${{ inputs.source_branch }})"
            git push
            echo "✅ Готово!"
          fi

      - name: Очистка
        if: always()
        run: rm -rf temp-source